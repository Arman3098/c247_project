# @package _global_
module:
  _target_: emg2qwerty.lightning.CNNTransformerCTCModule
  in_features: 528  # freq * channels = (n_fft // 2 + 1) * 16

  mlp_features: [384]

  # CNN: 4 TDS conv blocks (more than the LSTM variant's 2, to capture
  # richer local temporal patterns that the LSTM previously provided)
  cnn_block_channels: [24, 24, 24, 24]
  cnn_kernel_width: 32

  # Transformer: 4 layers, 4 heads (fewer but richer per-head),
  # GELU activation. Total model ~19.5M params.
  transformer_num_layers: 4
  transformer_nhead: 4
  transformer_dim_feedforward: 768

  dropout: 0.15

datamodule:
  _target_: emg2qwerty.lightning.WindowedEMGDataModule
  window_length: 8000
  padding: [1800, 200]

trainer:
  gradient_clip_val: 1.0
  max_epochs: 200

callbacks:
  - _target_: pytorch_lightning.callbacks.LearningRateMonitor
  - _target_: pytorch_lightning.callbacks.ModelCheckpoint
    dirpath: ${hydra:runtime.output_dir}/checkpoints
    monitor: ${monitor_metric}
    mode: ${monitor_mode}
    save_last: True
    verbose: True
  - _target_: pytorch_lightning.callbacks.EarlyStopping
    monitor: ${monitor_metric}
    mode: ${monitor_mode}
    patience: 30
    verbose: True
