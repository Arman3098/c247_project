# @package _global_
module:
  _target_: emg2qwerty.lightning.CNNGRUTransformerCTCModule
  in_features: 528
  mlp_features: [384]

  cnn_block_channels: [24, 24]
  cnn_kernel_width: 32

  gru_hidden_size: 430
  gru_num_layers: 2

  transformer_num_layers: 4
  transformer_nhead: 8
  transformer_dim_feedforward: 2048

  dropout: 0.15

datamodule:
  _target_: emg2qwerty.lightning.WindowedEMGDataModule
  window_length: 8000
  padding: [1800, 200]

trainer:
  gradient_clip_val: 1.0
  max_epochs: 200

callbacks:
  - _target_: pytorch_lightning.callbacks.LearningRateMonitor
  - _target_: pytorch_lightning.callbacks.ModelCheckpoint
    dirpath: ${hydra:runtime.output_dir}/checkpoints
    monitor: ${monitor_metric}
    mode: ${monitor_mode}
    save_last: True
    verbose: True
  - _target_: pytorch_lightning.callbacks.EarlyStopping
    monitor: ${monitor_metric}
    mode: ${monitor_mode}
    patience: 30
    verbose: True
