# @package _global_
module:
  _target_: emg2qwerty.lightning.CNNLSTMTransformerCTCModule
  in_features: 528  # freq * channels = (n_fft // 2 + 1) * 16
  mlp_features: [384]

  # CNN: 2 TDS conv blocks for local temporal features (reduced from 4)
  cnn_block_channels: [24, 24]
  cnn_kernel_width: 32

  # BiLSTM: 2 layers, hidden=384 → bidirectional output=768=num_features
  lstm_hidden_size: 384
  lstm_num_layers: 2

  # Transformer: 4 layers, 8-head attention, GELU activation
  transformer_num_layers: 4
  transformer_nhead: 8
  transformer_dim_feedforward: 2048

  dropout: 0.15

datamodule:
  _target_: emg2qwerty.lightning.WindowedEMGDataModule
  window_length: 8000  # 4 sec windows for 2kHz EMG
  padding: [1800, 200]  # 900ms past context, 100ms future context

trainer:
  gradient_clip_val: 1.0
  max_epochs: 200

callbacks:
  - _target_: pytorch_lightning.callbacks.LearningRateMonitor
  - _target_: pytorch_lightning.callbacks.ModelCheckpoint
    dirpath: ${hydra:runtime.output_dir}/checkpoints
    monitor: ${monitor_metric}
    mode: ${monitor_mode}
    save_last: True
    verbose: True
  - _target_: pytorch_lightning.callbacks.EarlyStopping
    monitor: ${monitor_metric}
    mode: ${monitor_mode}
    patience: 30
    verbose: True
